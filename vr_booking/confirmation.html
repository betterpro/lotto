<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Booking confirmed — Zero Latency VR Richmond</title>
  <meta name="theme-color" content="#0a0a12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/book/styles.css" />
  <style>
    .conf-wrap { max-width: 560px; margin: 40px auto 80px; }
    .tick { width: 84px; height: 84px; border-radius: 50%; display: grid; place-items: center;
      margin: 0 auto 20px; font-size: 42px; background: rgba(46,230,166,.14);
      border: 1px solid rgba(46,230,166,.5); }
    .tick.pending { background: rgba(109,92,255,.14); border-color: rgba(109,92,255,.5); }
    .conf-title { font-family: Orbitron, sans-serif; text-align: center; font-size: 28px; margin: 0 0 6px; }
    .conf-sub { text-align: center; color: var(--muted); margin: 0 0 26px; }
    .ref { text-align: center; margin-bottom: 26px; }
    .ref code { font-family: Orbitron, sans-serif; font-size: 22px; letter-spacing: 2px;
      background: var(--card); border: 1px solid var(--line); padding: 8px 16px; border-radius: 10px; }
    .loading { text-align: center; color: var(--muted); padding: 60px 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="/book/"><span class="brand-mark">◢◣</span><span class="brand-name">ZERO LATENCY VR</span></a>
    </div>
  </header>

  <main class="wrap">
    <div class="conf-wrap">
      <div id="loading" class="loading">Confirming your booking…</div>
      <div id="content" hidden>
        <div id="tick" class="tick">✓</div>
        <h1 id="title" class="conf-title">Booking confirmed!</h1>
        <p id="sub" class="conf-sub"></p>
        <div class="ref">Confirmation code<br /><code id="ref">—</code></div>
        <div class="summary-card">
          <div class="summary-poster" id="poster">🎮</div>
          <div class="summary-body">
            <h2 id="expName">—</h2>
            <ul class="summary-list">
              <li><span>When</span><strong id="when">—</strong></li>
              <li><span>Players</span><strong id="players">—</strong></li>
              <li><span>Venue</span><strong id="venue">—</strong></li>
              <li><span>Booked for</span><strong id="cname">—</strong></li>
            </ul>
            <div class="summary-total"><span>Paid</span><strong id="amount">—</strong></div>
          </div>
        </div>
        <p class="paynote" id="note">A confirmation email is on its way. Please arrive 15 minutes early for your safety briefing.</p>
        <a href="/book/" class="cta pay" style="text-align:center;text-decoration:none;display:block;">Book another mission</a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var ref = new URLSearchParams(location.search).get("ref");
      var loading = document.getElementById("loading");
      var content = document.getElementById("content");
      if (!ref) { loading.textContent = "No booking reference found."; return; }

      function pretty(dateStr, timeStr) {
        var d = new Date(dateStr + "T00:00:00");
        var ds = d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
        var t = new Date(dateStr + "T" + timeStr + ":00");
        var ts = t.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
        return ds + " · " + ts;
      }

      var tries = 0;
      function load() {
        fetch("/api/vr/booking/" + encodeURIComponent(ref))
          .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
          .then(function (b) {
            // If still pending (webhook not in yet), retry a few times.
            if (b.status === "pending" && tries < 5) {
              tries++; setTimeout(load, 1500); return;
            }
            loading.hidden = true; content.hidden = false;
            var confirmed = b.status === "confirmed";
            var tick = document.getElementById("tick");
            if (!confirmed) {
              tick.className = "tick pending"; tick.textContent = "⏳";
              document.getElementById("title").textContent = "Almost there…";
              document.getElementById("sub").textContent = "We're still confirming your payment. This page will update shortly.";
              setTimeout(load, 3000);
            } else {
              document.getElementById("sub").textContent = "Your VR mission is locked in. We can't wait to see you.";
            }
            document.getElementById("ref").textContent = b.ref;
            document.getElementById("poster").textContent = b.emoji || "🎮";
            document.getElementById("poster").style.background = "linear-gradient(150deg," + (b.accent || "#6d5cff") + "44,#0c0c16 70%)";
            document.getElementById("expName").textContent = b.experience_name;
            document.getElementById("when").textContent = pretty(b.slot_date, b.slot_time);
            document.getElementById("players").textContent = b.players + " player" + (b.players > 1 ? "s" : "");
            document.getElementById("venue").textContent = b.brand + " · " + b.venue_name;
            document.getElementById("cname").textContent = b.customer_name;
            document.getElementById("amount").textContent = b.amount_display;
          })
          .catch(function () {
            loading.textContent = "We couldn't find that booking (" + ref + ").";
          });
      }
      load();
    })();
  </script>
</body>
</html>
