services:
  - type: web
    name: lottoo
    env: python
    plan: starter
    buildCommand: bash build.sh
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    disk:
      name: lotto-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TRUSTEE_TELEGRAM_ID
        sync: false
      - key: CURRENCY
        value: CAD
      - key: DB_PATH
        value: /data/lotto.db
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
