services:
  - type: web
    name: lottoo
    env: python
    plan: starter
    pythonVersion: "3.12.9"
    buildCommand: bash build.sh
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PLATFORM_ADMIN_TELEGRAM_IDS
        sync: false
      - key: CURRENCY
        value: CAD
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: ADMIN_ETRANSFER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_LOTTERY_ACTOR
        sync: false
      - key: APIFY_LOTTERY_INPUT
        sync: false
      - key: IMAP_HOST
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: IMAP_PORT
        value: "993"
      - key: ETRANSFER_CHECK_INTERVAL_SECONDS
        value: "120"
